<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.google.com" />
    <link rel="stylesheet" href="output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap"
      rel="stylesheet"
    />
    <title>Register</title>
  </head>

  <style>
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(
          circle at 15% 50%,
          rgba(200, 169, 110, 0.15),
          transparent 50%
        ),
        radial-gradient(
          circle at 85% 50%,
          rgba(0, 128, 128, 0.08) 0%,
          transparent 50%
        );
      pointer-events: none;
      z-index: -1;
    }

    .logo-mark {
      transition: transform 0.3s ease;
    }

    .logo-mark:hover {
      transform: rotate(10deg) scale(1.1);
    }

    .btn-solid:hover {
      background-color: var(--color-accent);
      box-shadow: 0 6px 16px rgba(200, 169, 110, 0.25);
      transform: translateY(-1px);
    }

    .btn-ghost:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      background: rgba(200, 169, 110, 0.05);
    }

    em {
      color: teal;
      font-family: "Fraunces", serif;
      font-weight: 700;
      font-size: 18px;
    }

    .cta-primary:hover {
      background-color: var(--color-accent-hover);
      box-shadow: 0 12px 28px rgba(200, 169, 110, 0.4);
      transform: translateY(-3px);
    }

    .cta-secondary:hover {
      border-color: var(--color-ink);
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-3px);
    }

    /*  ANIMATIONS*/

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }
    .hero {
      animation: fadeIn 1s ease-out;
    }

    /* HAMBURGER-MOBILE */
    .nav-links {
      transition: right 0.3s ease;
    }

    .hamburger span {
      transition:
        transform 0.3s ease,
        opacity 0.3s ease;
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }
  </style>
  <body
    class="min-h-screen bg-bg font-sans text-ink flex flex-col overflow-x-hidden"
  >
    <!-- HEADER -->
    <header
      class="bg-white/80 backdrop-blur-md border-b border-border px-12 py-4 flex items-center justify-between sticky top-0 z-10"
    >
      <a href="index.html" class="no-underline flex items-center">
        <div class="logo-mark flex items-center gap-3">
          <img
            src="photos/my logo.webp"
            alt="Rowland Chazima"
            width="40"
            class="rounded-lg"
          />
          <span
            class="text-[13px] font-bold tracking-[0.15em] text-ink uppercase"
            >Rowland's webpage</span
          >
        </div>
      </a>

      <nav class="nav-links flex items-center gap-4" id="navLinks">
        <a
          href="login.html"
          class="btn-ghost text-[14px] font-semibold no-underline text-ink rounded-lg border border-border px-5 py-[10px] transition-all duration-300 bg-transparent"
          >Login</a
        >
        <a
          href="register.html"
          class="btn-solid text-[14px] font-semibold text-white no-underline bg-ink rounded-lg px-5 py-[10px] transition-all duration-300 shadow-[0_4px_12px_rgba(26,23,20,0.15)]"
          >Register</a
        >
      </nav>

      <button
        class="hamburger hidden flex-col gap-1.5 cursor-pointer bg-transparent border-none p-1 z-[100]"
        id="hamburger"
        aria-label="Toggle menu"
      >
        <span class="w-6 h-[2px] bg-ink"></span>
        <span class="w-6 h-[2px] bg-ink"></span>
        <span class="w-6 h-[2px] bg-ink"></span>
      </button>
    </header>

    <!-- HERO -->
    <section
      class="hero text-center flex flex-col items-center justify-center grow px-6 py-20 max-w-[900px] mx-auto gap-7"
    >
      <span
        class="text-[14px] font-semibold text-ink tracking-[0.05em] uppercase bg-white/70 border border-border px-6 py-[10px] rounded-[30px] inline-flex items-center gap-2 shadow-sm"
      >
        Welcome.<em>Bienvenue</em>
      </span>

      <h1
        class="text-[clamp(40px,6vw,64px)] font-serif font-bold text-ink leading-[1.1] tracking-[-0.02em]"
      >
        Feel free to login and register
      </h1>
      <p
        class="text-[clamp(16px,2vw,20px)] text-muted leading-relaxed max-w-[600px] mb-3"
      >
        Create your account, fill in your profile, and join a growing community
        of people on Rowland's platform.
      </p>

      <div class="cta-group flex gap-4 flex-wrap justify-center">
        <a
          href="register.html"
          class="cta-primary text-[16px] font-semibold text-ink no-underline bg-accent px-8 py-4 rounded-xl transition-all duration-300 shadow-[0_8px_24px_rgba(200,169,110,0.3)]"
          >Create an Account →</a
        >
        <a
          href="login.html"
          class="cta-secondary text-[16px] font-semibold text-ink no-underline bg-white border border-border px-8 py-4 rounded-xl transition-all duration-300 shadow-sm"
          >I already have an account</a
        >
      </div>
    </section>

    <!-- JAVASCRIPT -->
    <script>
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinks");
      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("active");
        hamburger.classList.toggle("active");
      });

      // HELL OF A MEDIA QUERY
      const mq = matchMedia("(max-width: 768px)");
      function applyMobileMenu(e) {
        if (e.matches) {
          hamburger.style.display = "block";
          Object.assign(navLinks.style, {
            position: "fixed",
            top: 0,
            right: "-100%",
            width: "260px",
            height: "100vh",
            background: "#fff",
            flexDirection: "column",
            justifyContent: "center",
            padding: "80px 24px 24px",
            boxShadow: "-4px 0 15px rgba(0,0,0,0.05)",
            zIndex: "90",
          });

          nav -
            links.querySelectorAll("a").forEach((a) => {
              a.style.width = "100%";
              a.style.textAlign = "center";
              a.style.padding = "15px 20px";
            });
        } else {
          hamburger.style.display = "none";
          navLinks.removeAttribute("style");
          navLinks.querySelectorAll("a").forEach((a) => {
            a.removeAttribute("style");
          });
        }
      }
      mq.addEventListener("change", applyMobile);
      applyMobile(mq);

      navLinks.classList.contains("active") && (navLinks.style.right = "0");
      hamburger.addEventListener("click", () => {
        navLinks.style.right = navLinks.classList.contains("active")
          ? "0"
          : "-100%";
      });
    </script>
  </body>
</html>
