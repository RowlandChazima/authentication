<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="output.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <style>
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(
          circle at 15% 50%,
          rgba(200, 169, 110, 0.15),
          transparent 50%
        ),
        radial-gradient(
          circle at 85% 50%,
          rgba(0, 128, 128, 0.08) 0%,
          transparent 50%
        );
      pointer-events: none;
      z-index: -1;
    }

    .logo-mark {
      transition: transform 0.3s ease;
    }

    .logo-mark:hover {
      transform: rotate(10deg) scale(1.1);
    }
    em {
      color: #c8a96e;
      font-family: "Fraunces", serif;
    }

    /* FADE UP ANIMATION */
    .wrap {
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-solid:hover {
      background-color: var(--color-accent);
      box-shadow: 0 6px 16px rgba(200, 169, 110, 0.25);
      transform: translateY(-1px);
    }

    .btn-ghost:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      background: rgba(200, 169, 110, 0.05);
    }

    /* HAMBURGER-MOBILE */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 4px;
      z-index: 100;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background-color: #333;
      transition:
        transform 0.3s ease,
        opacity 0.3s ease;
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a8278;
      padding: 10px;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e5e0d8;
    }

    /* LOGIN BUTTON */
    .btn:hover {
      background: #1f1c1a;
    }
    .btn:active {
      transform: scale(0.99);
    }

    /* Responsive styling */
    @media (max-width: 768px) {
      header {
        padding: 16px 24px;
      }

      .hamburger {
        display: flex;
      }

      .nav-links {
        position: fixed;
        top: 0;
        right: -100%;
        width: 260px;
        height: 100vh;
        background: var(--color-card);
        flex-direction: column;
        justify-content: center;
        padding: 80px 24px 24px;
        box-shadow: -4px 0 15px rgba(0, 0, 0, 0.05);
        transition: right 0.4s ease;
        z-index: 90;
      }

      .nav-links.active {
        right: 0;
      }

      .nav-links .btn-ghost,
      .nav-links .btn-solid {
        width: 100%;
        text-align: center;
        padding: 14px 20px;
      }
    }

    /* LOGIN BUTTON */
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--color-ink);
      color: #fff;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition:
        background 0.2s,
        transform 0.1s;
    }

    .btn:hover {
      background: #2d2925;
    }

    .btn:active {
      transform: scale(0.99);
    }

    /* FOOTER STYLING */
    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--color-muted);
    }

    .footer-note a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }
  </style>

  <body class="min-h-screen flex flex-col font-sans bg-bg overflow-hidden">
    <!-- HEADER -->
    <header
      class="bg-white/80 backdrop-blur-md border-b border-border px-12 py-4 flex items-center justify-between sticky top-0 z-10"
    >
      <a href="index.html" class="no-underline flex items-center">
        <div class="logo-mark flex items-center gap-3">
          <img
            src="photos/my logo.webp"
            alt="Rowland Chazima"
            width="40"
            class="rounded-lg"
          />
          <span
            class="text-[13px] font-bold tracking-[0.15em] text-ink uppercase"
            >Rowland's webpage</span
          >
        </div>
      </a>

      <nav class="nav-links flex items-center gap-4" id="navLinks">
        <a
          href="login.html"
          class="btn-ghost text-[14px] font-semibold no-underline text-ink rounded-lg border border-border px-5 py-[10px] transition-all duration-300 bg-transparent"
          >Login</a
        >
        <a
          href="register.html"
          class="btn-solid text-[14px] font-semibold text-white no-underline bg-ink rounded-lg px-5 py-[10px] transition-all duration-300 shadow-[0_4px_12px_rgba(26,23,20,0.15)]"
          >Register</a
        >
      </nav>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <!-- WRAP ON FORM -->

    <div class="wrap w-full max-w-[419px] mx-auto my-auto px-6 py-6">
      <div
        class="card bg-white border border-border rounded-2xl p-10 shadow-[0_2px_40px_rgba(0,0,0,0.06)]"
      >
        <h1
          class="font-serif text-[28px] font-light text-ink leading-[1.2] mb-[6px]"
        >
          Welcome <em>back.</em>
        </h1>
        <p class="text-[14px] text-muted mb-8 leading-relaxed">
          Bienvenue! Please sign in to continue.
        </p>

        <div class="divider mb-6">Sign in with email</div>

        <form action="dashboard.html" method="get">
          <div class="mb-5">
            <label
              class="block text-[11px] font-medium tracking-[0.1em] uppercase text-muted mb-2"
              for="email"
              >Email Address</label
            >
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
              class="w-full px-[14px] py-3 bg-input-bg border border-border rounded-lg font-sans text-[14px] text-ink transition-all duration-200"
            />
          </div>

          <div class="mb-5">
            <label
              class="block text-[11px] font-medium tracking-[0.1em] uppercase text-muted mb-2"
              for="password"
              >Password</label
            >
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              class="w-full px-[14px] py-3 bg-input-bg border border-border rounded-lg font-sans text-[14px] text-ink transition-all duration-200"
            />
          </div>

          <div class="remember-row my-5 gap-2 flex items-center">
            <input
              type="checkbox"
              id="remember"
              name="remember"
              class="accent-accent w-[14px] h-[14px]"
            />
            <span class="text-[13px] text-muted">Remember me</span>
          </div>

          <button class="btn" type="submit">Login →</button>
        </form>

        <p class="footer-note text-center mt-6 text-[13px] text-muted">
          Don't have an account?
          <a
            href="register.html"
            class="text-accent no-underline font-medium hover:underline"
            >Register here</a
          >.
        </p>
      </div>
    </div>

    <script>
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.querySelector(".nav-links");

      hamburger.addEventListener("click", () => {
        hamburger.classList.toggle("active");
        navLinks.classList.toggle("active");
      });
    </script>
  </body>
</html>
